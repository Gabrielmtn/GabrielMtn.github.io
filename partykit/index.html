<!--
  ============================================================
  PARTYKIT CANVAS — Client (GitHub Pages)
  ============================================================
  Drop this into your GitHub Pages repo.

  IMPORTANT: Change the `host` below to point at your
  deployed PartyKit server (or keep localhost:1999 for dev).
  ============================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PartyKit Canvas — Presence</title>

  <!-- PartyKit client library (CDN) -->
  <script src="https://unpkg.com/partysocket@0.0.20/dist/partysocket.js"></script>

  <style>
    /* ---------- RESET ---------- */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ---------- BODY ---------- */
    html, body {
      width: 100%; height: 100%;
      background: #0a0a0a;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* ---------- CANVAS ---------- */
    canvas {
      display: block;
      width: 100%; height: 100%;
      cursor: none;
    }

    /* ---------- HUD ---------- */
    #hud {
      position: fixed; top: 16px; left: 16px;
      color: #ffffff88; font-size: 13px;
      pointer-events: none; user-select: none;
      line-height: 1.6;
    }
    #hud .count { color: #4ecdc4; font-weight: 700; }

    /* ---------- NAME INPUT ---------- */
    #name-form {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 8px;
    }
    #name-form input {
      padding: 8px 14px; border-radius: 8px;
      border: 1px solid #ffffff33;
      background: #ffffff11; color: #fff;
      font-size: 14px; outline: none;
      width: 180px;
    }
    #name-form input::placeholder { color: #ffffff55; }
    #name-form input:focus { border-color: #4ecdc4; }
    #name-form button {
      padding: 8px 16px; border-radius: 8px;
      border: none; background: #4ecdc4;
      color: #0a0a0a; font-weight: 700;
      cursor: pointer; font-size: 14px;
    }
    #name-form button:hover { background: #45b7d1; }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div id="hud">
    Online: <span class="count" id="count">0</span>
  </div>

  <form id="name-form">
    <input type="text" id="name-input" placeholder="Your name…" maxlength="20" />
    <button type="submit">Set</button>
  </form>

  <script>
    // ============================================================
    //  CONFIG — change `host` when deploying
    // ============================================================
    const CONFIG = {
      host: "canvas-presence.gabrielmtn.partykit.dev",
      party: "cursor_party",
      room:  "lobby",
    };

    // ============================================================
    //  CANVAS SETUP
    // ============================================================
    const canvas = document.getElementById("canvas");
    const ctx    = canvas.getContext("2d");
    const countEl = document.getElementById("count");

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    // ============================================================
    //  CONNECT TO PARTYKIT
    // ============================================================
    const party = new PartySocket({
      host:  CONFIG.host,
      party: CONFIG.party,
      room:  CONFIG.room,
    });

    // Local cursor state (all known cursors)
    const cursors = {};

    // ============================================================
    //  SEND CURSOR POSITION
    // ============================================================
    let lastSent = { x: 0, y: 0 };

    canvas.addEventListener("mousemove", (e) => {
      const x = Math.round(e.clientX);
      const y = Math.round(e.clientY);
      if (x !== lastSent.x || y !== lastSent.y) {
        lastSent = { x, y };
        party.send(JSON.stringify({ type: "cursor", x, y }));
      }
    });

    canvas.addEventListener("mouseleave", () => {
      party.send(JSON.stringify({ type: "cursor", x: -1, y: -1 }));
    });

    // Touch support
    canvas.addEventListener("touchmove", (e) => {
      e.preventDefault();
      const t = e.touches[0];
      party.send(JSON.stringify({ type: "cursor", x: t.clientX, y: t.clientY }));
    }, { passive: false });

    canvas.addEventListener("touchend", () => {
      party.send(JSON.stringify({ type: "cursor", x: -1, y: -1 }));
    });

    // ============================================================
    //  HANDLE INCOMING MESSAGES
    // ============================================================
    party.onmessage = (e) => {
      const data = JSON.parse(e.data);
      switch (data.type) {
        case "cursor-move":
        case "cursor-update":
          cursors[data.cursor.id] = data.cursor;
          break;
        case "user-joined":
          cursors[data.cursor.id] = data.cursor;
          break;
        case "user-left":
          delete cursors[data.id];
          break;
        case "room-state":
          Object.assign(cursors, data.cursors);
          break;
      }
      countEl.textContent = Object.keys(cursors).length;
    };

    // ============================================================
    //  NAME FORM
    // ============================================================
    document.getElementById("name-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const name = document.getElementById("name-input").value.trim();
      if (name) {
        party.send(JSON.stringify({ type: "name", name }));
      }
    });

    // ============================================================
    //  RENDER LOOP
    // ============================================================
    function draw() {
      // Semi-transparent clear → trail effect
      ctx.fillStyle = "rgba(10, 10, 10, 0.18)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (const c of Object.values(cursors)) {
        if (c.x < 0 || c.y < 0) continue;

        // Glow
        const gradient = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, 30);
        gradient.addColorStop(0, c.color + "66");
        gradient.addColorStop(1, c.color + "00");
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(c.x, c.y, 30, 0, Math.PI * 2);
        ctx.fill();

        // Dot
        ctx.fillStyle = c.color;
        ctx.beginPath();
        ctx.arc(c.x, c.y, 5, 0, Math.PI * 2);
        ctx.fill();

        // Name label
        ctx.fillStyle = "#ffffffcc";
        ctx.font = "12px system-ui, sans-serif";
        ctx.fillText(c.name, c.x + 12, c.y - 12);
      }

      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
