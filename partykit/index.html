<!--
  ============================================================
  PARTYKIT CANVAS — Client (GitHub Pages)
  ============================================================
  Drop this into your GitHub Pages repo.
  Uses raw WebSocket — no external library needed.
  ============================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PartyKit Canvas — Presence</title>

  <style>
    /* ---------- RESET ---------- */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ---------- BODY ---------- */
    html, body {
      width: 100%; height: 100%;
      background: #0a0a0a;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* ---------- CANVAS ---------- */
    canvas {
      display: block;
      width: 100%; height: 100%;
      cursor: none;
    }

    /* ---------- HUD ---------- */
    #hud {
      position: fixed; top: 16px; left: 16px;
      color: #ffffff88; font-size: 13px;
      pointer-events: none; user-select: none;
      line-height: 1.6;
    }
    #hud .count { color: #4ecdc4; font-weight: 700; }

    /* ---------- NAME INPUT ---------- */
    #name-form {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 8px;
    }
    #name-form input {
      padding: 8px 14px; border-radius: 8px;
      border: 1px solid #ffffff33;
      background: #ffffff11; color: #fff;
      font-size: 14px; outline: none;
      width: 180px;
    }
    #name-form input::placeholder { color: #ffffff55; }
    #name-form input:focus { border-color: #4ecdc4; }
    #name-form button {
      padding: 8px 16px; border-radius: 8px;
      border: none; background: #4ecdc4;
      color: #0a0a0a; font-weight: 700;
      cursor: pointer; font-size: 14px;
    }
    #name-form button:hover { background: #45b7d1; }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div id="hud">
    Online: <span class="count" id="count">0</span>
  </div>

  <form id="name-form">
    <input type="text" id="name-input" placeholder="Your name…" maxlength="20" />
    <button type="submit">Set</button>
  </form>

  <script>
    // ============================================================
    //  CONFIG
    // ============================================================
    const CONFIG = {
      host:  "canvas-presence.gabrielmtn.partykit.dev",
      party: "cursor_party",
      room:  "lobby",
    };

    // ============================================================
    //  CANVAS SETUP
    // ============================================================
    const canvas  = document.getElementById("canvas");
    const ctx     = canvas.getContext("2d");
    const countEl = document.getElementById("count");

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    // ============================================================
    //  RAW WEBSOCKET (no PartySocket library needed)
    // ============================================================
    const wsUrl = `wss://${CONFIG.host}/parties/${CONFIG.party}/${CONFIG.room}/`;
    const ws    = new WebSocket(wsUrl);

    console.log("Connecting to:", wsUrl);
    ws.onopen   = () => console.log("Connected!");
    ws.onclose  = () => console.log("Disconnected");
    ws.onerror  = (e) => console.error("WS error", e);

    // Unique client id + random color
    const myId    = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2);
    const myColor = "#" + Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, "0");
    let myName    = "Anonymous";

    // Local cursor state (all known cursors)
    const cursors = {};

    // ============================================================
    //  HANDLE INCOMING MESSAGES
    // ============================================================
    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      switch (data.type) {
        case "room-state":
          // Full snapshot on connect
          Object.values(data.cursors).forEach(c => cursors[c.id] = c);
          break;
        case "cursor-move":
        case "cursor-update":
          cursors[data.cursor.id] = data.cursor;
          break;
        case "user-joined":
          cursors[data.cursor.id] = data.cursor;
          break;
        case "user-left":
          delete cursors[data.id];
          break;
      }
      countEl.textContent = Object.keys(cursors).length;
    };

    // ============================================================
    //  SEND CURSOR POSITION
    // ============================================================
    let lastSent = 0;

    function sendCursor(x, y) {
      const now = Date.now();
      if (now - lastSent > 33 && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type:  "cursor",
          id:    myId,
          x, y,
          color: myColor,
          name:  myName,
        }));
        lastSent = now;
      }
    }

    canvas.addEventListener("mousemove", (e) => {
      sendCursor(e.clientX, e.clientY);
    });

    canvas.addEventListener("mouseleave", () => {
      sendCursor(-1, -1);
    });

    // Touch support
    canvas.addEventListener("touchmove", (e) => {
      e.preventDefault();
      const t = e.touches[0];
      sendCursor(t.clientX, t.clientY);
    }, { passive: false });

    canvas.addEventListener("touchend", () => {
      sendCursor(-1, -1);
    });

    // ============================================================
    //  NAME FORM
    // ============================================================
    document.getElementById("name-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const input = document.getElementById("name-input");
      const name  = input.value.trim();
      if (name) {
        myName = name;
        sendCursor(-1, -1); // triggers update with new name
        input.value = "";
      }
    });

    // ============================================================
    //  RENDER LOOP
    // ============================================================
    function draw() {
      // Semi-transparent clear → trail effect
      ctx.fillStyle = "rgba(10, 10, 10, 0.18)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (const c of Object.values(cursors)) {
        if (c.x < 0 || c.y < 0) continue;

        // Glow
        const gradient = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, 30);
        gradient.addColorStop(0, c.color + "66");
        gradient.addColorStop(1, c.color + "00");
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(c.x, c.y, 30, 0, Math.PI * 2);
        ctx.fill();

        // Dot
        ctx.fillStyle = c.color;
        ctx.beginPath();
        ctx.arc(c.x, c.y, 5, 0, Math.PI * 2);
        ctx.fill();

        // White highlight
        ctx.fillStyle = "#ffffff55";
        ctx.beginPath();
        ctx.arc(c.x, c.y, 2.5, 0, Math.PI * 2);
        ctx.fill();

        // Name label
        const label = c.name || c.id.slice(0, 8);
        ctx.fillStyle = "#ffffffcc";
        ctx.font = "12px system-ui, sans-serif";
        ctx.fillText(label, c.x + 12, c.y - 12);
      }

      requestAnimationFrame(draw);
    }
    draw();

    // ============================================================
    //  CLEANUP ON UNLOAD
    // ============================================================
    window.addEventListener("beforeunload", () => {
      if (ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: "leave", id: myId }));
      }
    });
  </script>
</body>
</html>
